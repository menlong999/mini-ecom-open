name: ✨ 功能建议
description: 提议一个新功能或改进
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: 你想解决什么问题？
      description: 不是描述方案，而是描述背景与痛点
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 期望的方案
    validations:
      required: true
  - type: dropdown
    id: layer
    attributes:
      label: 期望落在哪一层？
      options:
        - 配置项 (tenant.config.js 字段)
        - UI 覆盖点 (slot / 组件替换)
        - 行为钩子 (前端/云函数 hook)
        - 内核能力 (新页面、新云函数)
        - 不确定
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 是否考虑过其他替代方案？
  - type: textarea
    id: context
    attributes:
      label: 补充信息
