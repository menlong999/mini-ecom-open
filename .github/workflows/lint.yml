name: Quality Gate

on:
  push:
    branches:
      - "**"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    name: quality
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: miniprogram

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: miniprogram/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Run Repository Checks
        run: npm run check
